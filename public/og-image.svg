<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1e1e22"/>

  <!-- Red accent bar on left -->
  <rect x="0" y="0" width="8" height="630" fill="#c24f5d"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#2e2e34" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#2e2e34" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#2e2e34" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#2e2e34" stroke-width="1"/>

  <!-- Shield icon -->
  <g transform="translate(100, 195)">
    <path d="M60 0 L120 22 L120 66 C120 99 92 126 60 135 C28 126 0 99 0 66 L0 22 Z" fill="#c24f5d" opacity="0.15"/>
    <path d="M60 8 L112 28 L112 66 C112 95 88 120 60 128 C32 120 8 95 8 66 L8 28 Z" fill="none" stroke="#c24f5d" stroke-width="3"/>
    <!-- Checkmark -->
    <polyline points="30,68 52,90 90,52" fill="none" stroke="#c24f5d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- SLAB COI Tracker -->
  <text x="100" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">SLAB COI Tracker</text>

  <!-- Subtitle -->
  <text x="100" y="468" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#7b7c81">Certificate of Insurance Management</text>

  <!-- Divider -->
  <rect x="100" y="494" width="60" height="4" rx="2" fill="#c24f5d"/>

  <!-- Tag line -->
  <text x="100" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#555560">Track subcontractor COIs · Expiration alerts · Compliance</text>

  <!-- Red accent circle top-right -->
  <circle cx="1100" cy="120" r="180" fill="#c24f5d" opacity="0.06"/>
  <circle cx="1100" cy="120" r="120" fill="#c24f5d" opacity="0.06"/>
</svg>
